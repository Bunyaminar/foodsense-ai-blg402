name: Flutter Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.0'
        channel: 'stable'
    
    - name: Install dependencies
      working-directory: ./foodsense_ai
      run: flutter pub get
    
    - name: Run tests
      working-directory: ./foodsense_ai
      run: flutter test
    
    - name: Test Summary
      if: success()
      run: echo "✅ All tests passed!"
