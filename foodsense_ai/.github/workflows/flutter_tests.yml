name: Flutter Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Install dependencies
      run: |
        cd foodsense_ai
        flutter pub get
    
    - name: Run tests
      run: |
        cd foodsense_ai
        flutter test
    
    - name: Check test results
      run: echo "✅ All tests passed!"
